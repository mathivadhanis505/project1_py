name: Auto Patch Python Dependencies

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit pytest

      - name: Fix vulnerabilities
        run: pip-audit --fix

      - name: Run tests
        run: pytest
