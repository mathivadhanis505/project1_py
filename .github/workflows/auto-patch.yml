name: Auto Patch Python Dependencies

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit pytest

      - name: Fix vulnerabilities
        run: pip-audit --fix

      - name: Run tests
        run: pytest

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto Patch Dependencies"
          body: "Automated dependency updates using CI"
          branch: auto-patch-branch
          commit-message: "Auto patch dependencies"
          delete-branch: true

      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge --auto --merge ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}