name: Auto Patch Python Dependencies

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit pytest

      - name: Fix vulnerabilities
        run: pip-audit --fix

      - name: Run tests
        run: pytest

      - name: Commit changes
        run: |
          git config --global user.name "autopatch-bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Auto patch dependencies" || echo "No changes"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: "Auto Patch Dependencies"
          body: "Automated dependency updates using CI"
          branch: auto-patch-branch
          commit-message: "Auto patch dependencies"
